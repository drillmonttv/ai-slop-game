<!DOCTYPE html>
<html>
<head>
    <title>Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <a href="/">Domu</a>
        {% if 'user_id' in session %}
            <a href="/post/create">Novy prispevek</a>
            <a href="/logout">Odhlasit</a>
        {% else %}
            <a href="/login">Login</a>
            <a href="/register">Registrace</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
