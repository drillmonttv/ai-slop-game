{% extends 'base.html' %}

{% block content %}
<h1>{{ post.title }}</h1>
<p>{{ post.content }}</p>

<h3>Comments</h3>

{% for c in post.comments %}
<div class="comment">
    {{ c.content }}
</div>
{% endfor %}

<form method="POST">
    <textarea name="content"></textarea>
    <button>Send</button>
</form>

{% endblock %}

{% if session.get('user_id') == post.user_id %}
    <a href="/post/{{ post.id }}/edit">Edit</a>
    <a href="/post/{{ post.id }}/delete">Delete</a>
{% endif %}
<small>
    {{ post.author.username }} |
    {{ post.created_at }}
</small>
