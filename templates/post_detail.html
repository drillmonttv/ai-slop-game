{% extends 'base.html' %}

{% block content %}
<h1>{{ post.title }}</h1>
<p>{{ post.content }}</p>
<p><b>Autor:</b> {{ post.author.username }}</p>

<h3>Komentare</h3>
{% for comment in post.comments %}
<div class="comment">
    <p>{{ comment.content }}</p>
    <small>{{ comment.author.username }}</small>
</div>
{% endfor %}

{% if 'user_id' in session %}
<form method="POST">
    <textarea name="content" placeholder="Napis komentar"></textarea>
    <button type="submit">Pridat komentar</button>
</form>
{% endif %}
{% endblock %}
